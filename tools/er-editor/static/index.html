<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Editor</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
</head>
<body>
    <!-- Toolbar -->
    <div id="toolbar">
        <div class="toolbar-group">
            <div class="search-wrapper">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <circle cx="7" cy="7" r="5" stroke="#9ca3af" stroke-width="1.5"/>
                    <line x1="11" y1="11" x2="14" y2="14" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search tables..." />
            </div>
        </div>
        <div class="toolbar-spacer"></div>
        <div class="toolbar-group">
            <button id="btn-add-table" class="toolbar-btn" title="Add new table">+ Table</button>
            <button id="btn-add-group" class="toolbar-btn" title="Add new group">+ Group</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-save" class="toolbar-btn toolbar-btn--save" title="Save model to disk (Ctrl+S)">Save Model<span class="dirty-dot"></span></button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-undo" class="toolbar-btn toolbar-btn--icon" disabled aria-label="Undo (Ctrl+Z)" title="Undo (Ctrl+Z)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 7h8a3 3 0 0 1 0 6H9" stroke="#374151" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 4L4 7l3 3" stroke="#374151" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="btn-redo" class="toolbar-btn toolbar-btn--icon" disabled aria-label="Redo (Ctrl+Shift+Z)" title="Redo (Ctrl+Shift+Z)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 7H4a3 3 0 0 0 0 6h3" stroke="#374151" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 4l3 3-3 3" stroke="#374151" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-collapse-all" class="toolbar-btn">Collapse All</button>
            <button id="btn-expand-all" class="toolbar-btn">Expand All</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-relayout" class="toolbar-btn">Re-layout</button>
            <button id="btn-fit-all" class="toolbar-btn">Fit All</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-zoom-out" class="toolbar-btn" aria-label="Zoom out">&minus;</button>
            <span id="zoom-level">100%</span>
            <button id="btn-zoom-in" class="toolbar-btn" aria-label="Zoom in">+</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-preview" class="toolbar-btn" title="Toggle code preview">Code Preview</button>
        </div>
    </div>

    <!-- Canvas container -->
    <div id="canvas-container">
        <!-- Loading state -->
        <div id="loading-state" class="state-overlay">
            <div class="spinner"></div>
            <p>Loading model...</p>
        </div>
        <!-- Empty state (hidden by default) -->
        <div id="empty-state" class="state-overlay" style="display:none;">
            <h2>No tables found</h2>
            <p>The model file does not contain any SQLAlchemy table definitions. Make sure the file uses the Mapped[] pattern with __tablename__ defined.</p>
        </div>
        <!-- Error state (hidden by default) -->
        <div id="error-state" class="state-overlay" style="display:none;">
            <h2>Error</h2>
            <p id="error-message"></p>
        </div>
        <!-- JointJS paper mounts here -->
        <div id="paper"></div>
    </div>

    <!-- Code Preview Panel -->
    <div id="preview-panel">
        <div class="resize-handle"><span class="resize-dots">...</span></div>
        <div class="preview-header">
            <h3>Code Preview</h3>
            <button class="preview-close" aria-label="Close code preview">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
        <div class="preview-loading"></div>
        <div class="preview-code">
            <pre><code class="language-python"></code></pre>
        </div>
    </div>
    <div id="preview-tab" aria-label="Open code preview">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <!-- Search no results -->
    <div id="search-no-results"></div>

    <!-- CDN Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@joint/core@4.1.3/dist/joint.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/python.min.js"></script>

    <!-- App scripts (loaded in dependency order) -->
    <script src="/shapes.js"></script>
    <script src="/canvas.js"></script>
    <script src="/layout.js"></script>
    <script src="/undo.js"></script>
    <script src="/editor.js"></script>
    <script src="/groups.js"></script>
    <script src="/preview.js"></script>
    <script src="/toolbar.js"></script>
    <script src="/app.js"></script>
</body>
</html>
