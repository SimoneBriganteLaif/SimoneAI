<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Editor</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Toolbar -->
    <div id="toolbar">
        <div class="toolbar-group">
            <div class="search-wrapper">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <circle cx="7" cy="7" r="5" stroke="#9ca3af" stroke-width="1.5"/>
                    <line x1="11" y1="11" x2="14" y2="14" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search tables..." />
            </div>
        </div>
        <div class="toolbar-spacer"></div>
        <div class="toolbar-group">
            <button id="btn-collapse-all" class="toolbar-btn">Collapse All</button>
            <button id="btn-expand-all" class="toolbar-btn">Expand All</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-relayout" class="toolbar-btn">Re-layout</button>
            <button id="btn-fit-all" class="toolbar-btn">Fit All</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-zoom-out" class="toolbar-btn" aria-label="Zoom out">&minus;</button>
            <span id="zoom-level">100%</span>
            <button id="btn-zoom-in" class="toolbar-btn" aria-label="Zoom in">+</button>
        </div>
    </div>

    <!-- Canvas container -->
    <div id="canvas-container">
        <!-- Loading state -->
        <div id="loading-state" class="state-overlay">
            <div class="spinner"></div>
            <p>Loading model...</p>
        </div>
        <!-- Empty state (hidden by default) -->
        <div id="empty-state" class="state-overlay" style="display:none;">
            <h2>No tables found</h2>
            <p>The model file does not contain any SQLAlchemy table definitions. Make sure the file uses the Mapped[] pattern with __tablename__ defined.</p>
        </div>
        <!-- Error state (hidden by default) -->
        <div id="error-state" class="state-overlay" style="display:none;">
            <h2>Error</h2>
            <p id="error-message"></p>
        </div>
        <!-- JointJS paper mounts here -->
        <div id="paper"></div>
    </div>

    <!-- CDN Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@joint/core@4.1.3/dist/joint.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@dagrejs/dagre@2.0.4/dist/dagre.js"></script>

    <!-- App scripts (loaded in order) -->
    <script src="/shapes.js"></script>
    <script src="/canvas.js"></script>
    <script src="/layout.js"></script>
    <script src="/toolbar.js"></script>
    <script src="/app.js"></script>
</body>
</html>
